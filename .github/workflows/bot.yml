name: Alpaca Trading Bot

on:
  schedule:
    # Every 5 minutes, Monâ€“Fri, 9:30 AM â€“ 4:00 PM ET (13:30â€“20:00 UTC)
    # GitHub cron doesn't support minute-level time-of-day filtering,
    # so we cover 13:00â€“20:00 UTC and let the bot's own market-open check
    # prevent trades outside market hours.
    - cron: '*/5 13-20 * * 1-5'

    # Daily performance report at ~4:10 PM ET (20:10 UTC)
    - cron: '10 20 * * 1-5'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_report:
        description: 'Run report instead of trading bot?'
        required: false
        default: 'false'

jobs:
  trade:
    name: Run Trading Bot
    runs-on: ubuntu-latest

    # Skip the report-only cron for the trade job
    if: >
      github.event_name == 'workflow_dispatch' && github.event.inputs.run_report != 'true'
      || (github.event_name == 'schedule' && github.event.schedule == '*/5 13-20 * * 1-5')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          APCA_API_KEY_1:    ${{ secrets.APCA_API_KEY_1 }}
          APCA_API_SECRET_1: ${{ secrets.APCA_API_SECRET_1 }}
          APCA_BASE_URL_1:   ${{ secrets.APCA_BASE_URL_1 }}
          APCA_API_KEY_2:    ${{ secrets.APCA_API_KEY_2 }}
          APCA_API_SECRET_2: ${{ secrets.APCA_API_SECRET_2 }}
          APCA_BASE_URL_2:   ${{ secrets.APCA_BASE_URL_2 }}
        run: python bot.py

  report:
    name: Daily Performance Report
    runs-on: ubuntu-latest

    # Only run for the report cron or manual trigger with run_report=true
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_report == 'true')
      || (github.event_name == 'schedule' && github.event.schedule == '10 20 * * 1-5')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily report
        env:
          APCA_API_KEY_1:    ${{ secrets.APCA_API_KEY_1 }}
          APCA_API_SECRET_1: ${{ secrets.APCA_API_SECRET_1 }}
          APCA_BASE_URL_1:   ${{ secrets.APCA_BASE_URL_1 }}
          APCA_API_KEY_2:    ${{ secrets.APCA_API_KEY_2 }}
          APCA_API_SECRET_2: ${{ secrets.APCA_API_SECRET_2 }}
          APCA_BASE_URL_2:   ${{ secrets.APCA_BASE_URL_2 }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:        ${{ secrets.EMAIL_PASS }}
        run: python report.py

name: Alpaca Trading Bot

on:
  schedule:
    # Every 5 minutes, Mon-Fri, covering 9:00 AM - 4:15 PM ET (13:00-20:15 UTC)
    # Bot itself checks market-open status and skips if closed
    - cron: '*/5 13-20 * * 1-5'

    # Daily performance report at ~4:10 PM ET (20:10 UTC)
    - cron: '10 20 * * 1-5'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      run_report:
        description: 'Run report instead of trading bot?'
        required: false
        default: 'false'

jobs:
  trade:
    name: Run Trading Bot
    runs-on: ubuntu-latest
    # Simplified condition - avoids github.event.schedule matching issues
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_report != 'true')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot
        env:
          APCA_API_KEY_1:    ${{ secrets.APCA_API_KEY_1 }}
          APCA_API_SECRET_1: ${{ secrets.APCA_API_SECRET_1 }}
          APCA_BASE_URL_1:   ${{ secrets.APCA_BASE_URL_1 }}
          APCA_API_KEY_2:    ${{ secrets.APCA_API_KEY_2 }}
          APCA_API_SECRET_2: ${{ secrets.APCA_API_SECRET_2 }}
          APCA_BASE_URL_2:   ${{ secrets.APCA_BASE_URL_2 }}
        run: python bot.py

  report:
    name: Daily Performance Report
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_report == 'true') ||
      github.event_name == 'schedule'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily report
        env:
          APCA_API_KEY_1:    ${{ secrets.APCA_API_KEY_1 }}
          APCA_API_SECRET_1: ${{ secrets.APCA_API_SECRET_1 }}
          APCA_BASE_URL_1:   ${{ secrets.APCA_BASE_URL_1 }}
          APCA_API_KEY_2:    ${{ secrets.APCA_API_KEY_2 }}
          APCA_API_SECRET_2: ${{ secrets.APCA_API_SECRET_2 }}
          APCA_BASE_URL_2:   ${{ secrets.APCA_BASE_URL_2 }}
          EMAIL_USER:        ${{ secrets.EMAIL_USER }}
          EMAIL_PASS:        ${{ secrets.EMAIL_PASS }}
        run: python report.py
